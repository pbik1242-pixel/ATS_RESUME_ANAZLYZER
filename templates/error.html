<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Error - ATS RESUME ANALYZER</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>{% include "_theme.css" %}</style>
</head>
<body class="app-shell">
  {% set page_badge = "Error" %}
  {% set page_cta_href = "/" %}
  {% set page_cta_label = "Analyze Now" %}
  {% set active_page = "" %}
  {% include "_app_topbar.html" %}

  <div class="page-wrap max-w-3xl page-wrap--content">
    <div class="glass-panel p-8 text-center md:p-10">
      <p class="badge-pill mb-4">Request Error</p>
      <h1 class="brand-title text-5xl font-bold">{{ code or "Error" }}</h1>
      <p class="text-muted mt-4 text-base">{{ message or "Something went wrong." }}</p>
      <div class="mt-7">
        <a href="/" class="btn-secondary">&larr; Back to Home</a>
      </div>
    </div>
  </div>
{% include "_cookie.html" %}
</body>
</html>
