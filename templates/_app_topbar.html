<header class="app-topbar">
  <div class="app-topbar__inner">
    <div class="app-topbar__left">
      <a href="/" class="app-brand" aria-label="ATS Resume Analyzer home">
        <div class="app-logo">IQ</div>
        <span class="brand-title text-lg font-bold">ATS RESUME ANALYZER</span>
      </a>
      {% if page_badge is defined and page_badge %}
      <span class="badge-pill">{{ page_badge }}</span>
      {% endif %}
    </div>
    <div class="app-topbar__center">
      {% for item in primary_nav_items %}
      <a href="{{ item.href }}" class="{% if request.url.path == item.href %}is-active{% endif %}">{{ item.label }}</a>
      {% endfor %}
    </div>
    <div class="app-topbar__right">
      <details class="profile-menu">
        <summary class="profile-menu__trigger" aria-label="Open profile navigation">
          <span class="profile-menu__label">{{ role_label }}</span>
          <span class="profile-menu__icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21a8 8 0 0 0-16 0"></path>
              <circle cx="12" cy="8" r="3.2"></circle>
            </svg>
          </span>
        </summary>
        <div class="profile-menu__panel">
          {% for item in profile_menu_items %}
          <a href="{{ item.href }}" class="profile-menu__item {% if request.url.path == item.href %}is-active{% endif %}{% if item.href == '/logout' %} text-danger{% endif %}">
            {{ item.label }}
          </a>
          {% endfor %}
        </div>
      </details>
    </div>
  </div>
</header>
<script>
  (function () {
    const menus = document.querySelectorAll(".profile-menu");
    if (!menus.length) return;

    function closeAll(exceptMenu) {
      menus.forEach(menu => {
        if (menu !== exceptMenu) menu.removeAttribute("open");
      });
    }

    menus.forEach(menu => {
      const summary = menu.querySelector("summary");
      if (!summary) return;
      summary.addEventListener("click", () => {
        const willOpen = !menu.hasAttribute("open");
        closeAll(willOpen ? menu : null);
      });
    });

    document.addEventListener("click", event => {
      menus.forEach(menu => {
        if (!menu.contains(event.target)) menu.removeAttribute("open");
      });
    });

    document.addEventListener("keydown", event => {
      if (event.key === "Escape") closeAll(null);
    });
  })();
</script>
